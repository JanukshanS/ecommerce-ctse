server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # ----------- Global CORS -----------
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - Authorization

      # ----------- Routes -----------
      routes:
        # ── Auth Service ─────────────────────────────────────────────────────
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - name: JwtAuthenticationFilter
            - name: CircuitBreaker
              args:
                name: authCircuitBreaker
                fallbackUri: forward:/fallback/auth
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
                methods: GET,POST
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 500ms
                  factor: 2
                  basedOnPreviousValue: false

        # ── Catalog Service ───────────────────────────────────────────────────
        - id: catalog-service
          uri: ${CATALOG_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/catalog/**
          filters:
            - name: JwtAuthenticationFilter
            - name: CircuitBreaker
              args:
                name: catalogCircuitBreaker
                fallbackUri: forward:/fallback/catalog
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
                methods: GET
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 500ms
                  factor: 2
                  basedOnPreviousValue: false

        # ── Cart Service ──────────────────────────────────────────────────────
        - id: cart-service
          uri: ${CART_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/cart/**
          filters:
            - name: JwtAuthenticationFilter
            - name: CircuitBreaker
              args:
                name: cartCircuitBreaker
                fallbackUri: forward:/fallback/cart

        # ── Order Service ─────────────────────────────────────────────────────
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/orders/**
          filters:
            - name: JwtAuthenticationFilter
            - name: CircuitBreaker
              args:
                name: orderCircuitBreaker
                fallbackUri: forward:/fallback/order

        # ── Payment Service ───────────────────────────────────────────────────
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/payments/**
          filters:
            - name: JwtAuthenticationFilter
            - name: CircuitBreaker
              args:
                name: paymentCircuitBreaker
                fallbackUri: forward:/fallback/payment

# ----------- JWT (shared secret with all services) -----------
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# ----------- Resilience4j Circuit Breaker Config -----------
resilience4j:
  circuitbreaker:
    configs:
      default:
        # Opens after 50% of last 10 calls fail
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        failureRateThreshold: 50
        # Time circuit stays OPEN before going HALF-OPEN
        waitDurationInOpenState: 10s
        # Number of test calls in HALF-OPEN to decide whether to close
        permittedNumberOfCallsInHalfOpenState: 3
        # Treat connection refused / timeout as failures
        recordExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.cloud.gateway.support.NotFoundException
    instances:
      authCircuitBreaker:
        baseConfig: default
        waitDurationInOpenState: 5s # recover faster for auth
      catalogCircuitBreaker:
        baseConfig: default
      cartCircuitBreaker:
        baseConfig: default
      orderCircuitBreaker:
        baseConfig: default
      paymentCircuitBreaker:
        baseConfig: default
        failureRateThreshold: 30 # stricter for payments

  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
    instances:
      authCircuitBreaker:
        timeoutDuration: 3s
      paymentCircuitBreaker:
        timeoutDuration: 10s # payment processing can be slower

# ----------- Actuator -----------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,gateway
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

logging:
  level:
    com.ecommerce.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    io.github.resilience4j: INFO
