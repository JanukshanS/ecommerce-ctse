name: Trigger auto deployment for api-gw-service

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - 'api-gateway/**'
    - '.github/workflows/api-gw-service-AutoDeployTrigger-b9bda932-67f0-4b17-85d4-e06debd4f75b.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.APIGWSERVICE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.APIGWSERVICE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.APIGWSERVICE_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy pre-built Docker Hub image to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: api-gw-service
          resourceGroup: rg-ecommerce-ctse
          imageToDeploy: docker.io/janukshan/ecommerce-api-gateway:latest
          registryUrl: docker.io
          registryUsername: ${{ secrets.APIGWSERVICE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.APIGWSERVICE_REGISTRY_PASSWORD }}
