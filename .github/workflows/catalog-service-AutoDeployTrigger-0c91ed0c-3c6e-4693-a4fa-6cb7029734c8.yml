name: Trigger auto deployment for catalog-service

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo. 
  # Your catalog-service-cicd.yml already builds and pushes the image to Docker Hub.
  # This workflow simply tells Azure to pull and redeploy that new image.
  push:
    branches: 
      [ main ]
    paths:
    - 'catalog-service/**'
    - '.github/workflows/catalog-service-AutoDeployTrigger-0c91ed0c-3c6e-4693-a4fa-6cb7029734c8.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CATALOGSERVICE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CATALOGSERVICE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CATALOGSERVICE_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy pre-built Docker Hub image to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: catalog-service
          resourceGroup: rg-ecommerce-ctse
          imageToDeploy: docker.io/janukshan/ecommerce-catalog-service:latest
          registryUrl: docker.io
          registryUsername: ${{ secrets.CATALOGSERVICE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CATALOGSERVICE_REGISTRY_PASSWORD }}
