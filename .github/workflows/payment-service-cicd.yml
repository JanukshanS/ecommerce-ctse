name: Payment Service CI/CD

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'payment-service/**'
      - 'pom.xml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'payment-service/**'
      - 'pom.xml'
  workflow_dispatch:


env:
  # Change this to your Docker Hub username and repository name
  DOCKER_IMAGE: janukshan/ecommerce-payment-service

jobs:
  build-and-test:
    name: Build, Test, and Analyze
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history is required for SonarCloud analysis

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run Unit Tests
        # -pl specifies the module, -am also builds required dependencies (like the parent pom)
        run: mvn -B clean verify -pl payment-service -am

      # --- 1. SAST Integration (SonarCloud) ---
      # Uncomment the block below once you have set up a SonarCloud project and added the SONAR_TOKEN to GitHub Secrets
      - name: Analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=JanukshanS_ecommerce-ctse -Dsonar.organization=janukshans

  docker-build-and-push:
    name: Build and Push Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    # Only push Docker image on push to main/master, not on PRs
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- 2. Docker Hub Integration ---
      # Uncomment this block once you have added DOCKER_USERNAME and DOCKER_PASSWORD to GitHub Secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: payment-service/Dockerfile
          push: true # Set to true to push to Docker Hub
          tags: ${{ env.DOCKER_IMAGE }}:latest,${{ env.DOCKER_IMAGE }}:${{ github.sha }}
