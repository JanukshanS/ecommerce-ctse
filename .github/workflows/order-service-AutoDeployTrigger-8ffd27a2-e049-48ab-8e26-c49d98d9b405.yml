name: Trigger auto deployment for order-service

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo. 
  # Your order-service-cicd.yml already builds and pushes the image to Docker Hub.
  # This workflow simply tells Azure to pull and redeploy that new image.
  push:
    branches: 
      [ main ]
    paths:
    - 'order-service/**'
    - '.github/workflows/order-service-AutoDeployTrigger-8ffd27a2-e049-48ab-8e26-c49d98d9b405.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ORDERSERVICE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ORDERSERVICE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ORDERSERVICE_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy pre-built Docker Hub image to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: order-service
          resourceGroup: rg-ecommerce-ctse
          imageToDeploy: docker.io/janukshan/ecommerce-order-service:latest
          registryUrl: docker.io
          registryUsername: ${{ secrets.ORDERSERVICE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.ORDERSERVICE_REGISTRY_PASSWORD }}


