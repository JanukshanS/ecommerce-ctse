name: Trigger auto deployment for cart-service

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo. 
  # Your cart-service-cicd.yml already builds and pushes the image to Docker Hub.
  # This workflow simply tells Azure to pull and redeploy that new image.
  push:
    branches: 
      [ main ]
    paths:
    - 'cart-service/**'
    - '.github/workflows/cart-service-AutoDeployTrigger-8423e22c-6e38-47a5-b25a-775c2253b98d.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CARTSERVICE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CARTSERVICE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CARTSERVICE_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy pre-built Docker Hub image to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: cart-service
          resourceGroup: rg-ecommerce-ctse
          imageToDeploy: docker.io/janukshan/ecommerce-cart-service:latest
          registryUrl: docker.io
          registryUsername: ${{ secrets.CARTSERVICE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CARTSERVICE_REGISTRY_PASSWORD }}


