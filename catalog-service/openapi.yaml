openapi: 3.0.3
info:
  title: catalog-service
  version: 1.0.0

servers:
  - url: http://localhost:8082

paths:
  /api/catalog/products:
    post:
      summary: Create a new product
      operationId: createProduct
      parameters:
        - $ref: '#/components/parameters/XUserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '200':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
    get:
      summary: List products with pagination
      operationId: listProducts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Paginated products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPage'

  /api/catalog/products/{id}:
    get:
      summary: Get product by ID
      operationId: getProduct
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
    put:
      summary: Update product
      operationId: updateProduct
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/XUserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
    delete:
      summary: Delete product
      operationId: deleteProduct
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - $ref: '#/components/parameters/XUserId'
      responses:
        '204':
          description: Product deleted

  /api/catalog/products/category/{category}:
    get:
      summary: List products by category
      operationId: listProductsByCategory
      parameters:
        - name: category
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Paginated products by category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPage'

  /api/catalog/products/search:
    get:
      summary: Search products
      operationId: searchProducts
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Paginated search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPage'

  /api/catalog/products/{id}/stock-check:
    get:
      summary: Check product stock availability
      operationId: stockCheck
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - name: quantity
          in: query
          required: true
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Stock check result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockCheckResponse'

components:
  parameters:
    XUserId:
      name: X-User-Id
      in: header
      required: true
      schema:
        type: string
    ProductId:
      name: id
      in: path
      required: true
      schema:
        type: string

  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
        category:
          type: string
        stock:
          type: integer
        sellerId:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
        category:
          type: string
        stock:
          type: integer
        active:
          type: boolean

    ProductPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        totalElements:
          type: integer
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer
        first:
          type: boolean
        last:
          type: boolean
        empty:
          type: boolean

    StockCheckResponse:
      type: object
      properties:
        productId:
          type: string
        requestedQuantity:
          type: integer
        available:
          type: integer
