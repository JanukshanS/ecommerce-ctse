server:
  port: 8082
  servlet:
    context-path: /

spring:
  application:
    name: catalog-service

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/catalogdb}
      database: catalogdb
      auto-index-creation: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# -------------------------------------------------------------------------
# Inter-Service Communication URLs
# In Azure Container Apps: services reach each other by container app name.
# Locally: uses localhost + port.
# -------------------------------------------------------------------------
services:
  auth-url: ${AUTH_SERVICE_URL:http://localhost:8081}
  cart-url: ${CART_SERVICE_URL:http://localhost:8083}
  order-url: ${ORDER_SERVICE_URL:http://localhost:8084}

# -------------------------------------------------------------------------
# Actuator
# -------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: catalog-service
    description: Product Catalog Microservice
    version: 1.0.0

# -------------------------------------------------------------------------
# SpringDoc / Swagger UI
# -------------------------------------------------------------------------
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    try-it-out-enabled: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

# -------------------------------------------------------------------------
# Logging
# -------------------------------------------------------------------------
logging:
  level:
    com.ecommerce.catalog: DEBUG
    org.springframework.data.mongodb: INFO
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
